repos:
  - repo: local
    hooks:
      - id: gitleaks
        name: gitleaks
        entry: gitleaks protect --staged
        language: system
        pass_filenames: false

      - id: detect-secrets
        name: detect-secrets
        entry: venv/bin/detect-secrets-hook --baseline .secrets.baseline
        language: system

      - id: black
        name: black
        entry: venv/bin/black --check .
        language: system
        pass_filenames: false

      - id: flake8
        name: flake8
        entry: venv/bin/flake8 . --exclude=venv,./notebooks/,./ml_pipeline,./data-dictionary
        language: system
        pass_filenames: false